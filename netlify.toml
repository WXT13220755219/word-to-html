[build]
  base = "web_app"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/upload-config"
  to = "/.netlify/functions/upload-config"
  status = 200

[[redirects]]
  from = "/api/convert/download"
  to = "/.netlify/functions/convert-download"
  status = 200

[[redirects]]
  from = "/api/convert/status"
  to = "/.netlify/functions/convert-status"
  status = 200

[[redirects]]
  from = "/api/convert"
  to = "/.netlify/functions/convert-start"
  status = 200
